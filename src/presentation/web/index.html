<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Локальный ИИ-помощник по Трудовому кодексу РФ">
  <title>ПравоТруд — помощник по ТК РФ</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/assets/logs.css">
</head>
<body>
  <main class="shell">
    <aside id="logPanel" class="logs" aria-label="Журнал работы" aria-hidden="true">
      <div class="logs-head"><div><span class="logs-dot"></span><strong>Журнал</strong></div><div class="logs-actions"><button id="clearLogs" type="button">Очистить</button><button id="collapseLogs" type="button" aria-label="Свернуть журнал">‹</button></div></div>
      <div id="logEntries" class="log-entries" aria-live="polite"></div>
      <button id="expandLogs" class="expand-logs" type="button" aria-label="Раскрыть журнал">›</button>
    </aside>
    <section class="chat" aria-label="Чат с помощником">
      <header>
        <div class="mark">ПТ</div>
        <div><h1>ПравоТруд</h1><p><span class="dot"></span> Локальный помощник по ТК РФ</p></div>
        <button id="settingsBtn" class="icon-btn" aria-label="Открыть настройки" title="Настройки">⚙</button>
      </header>
      <div id="messages" class="messages" aria-live="polite">
        <div class="welcome">
          <div class="book">§</div>
          <h2>Разберёмся в трудовом праве</h2>
          <p>Задайте вопрос по ТК РФ. Ответ будет составлен на основе загруженной редакции кодекса.</p>
          <div class="suggestions">
            <button>Как оплачивается сверхурочная работа?</button>
            <button>Когда работодатель может уволить сотрудника?</button>
            <button>Сколько дней длится ежегодный отпуск?</button>
          </div>
        </div>
      </div>
      <form id="chatForm" class="composer">
        <textarea id="input" rows="1" maxlength="2000" placeholder="Задайте вопрос по трудовому праву…" aria-label="Сообщение"></textarea>
        <button id="sendBtn" type="submit" aria-label="Отправить">↑</button>
      </form>
      <p class="disclaimer">Ответы носят справочный характер и не заменяют консультацию юриста</p>
    </section>
  </main>
  <dialog id="settings">
    <form method="dialog" class="modal">
      <div class="modal-head"><div><h2>Настройки доступа</h2><p>Ключ хранится только в вашем браузере</p></div><button value="cancel" aria-label="Закрыть">×</button></div>
      <label for="key">Ключ доступа</label>
      <div class="key-row"><input id="key" type="password" autocomplete="current-password" placeholder="Введите ключ из Railway"><button id="toggle" type="button" aria-label="Показать ключ">◉</button></div>
      <label class="switch-row" for="logsEnabled"><span><strong>Показывать журнал</strong><small>События запросов и работы помощника</small></span><span class="switch"><input id="logsEnabled" type="checkbox"><span></span></span></label>
      <p id="keyStatus" class="status"></p>
      <button id="saveKey" type="button" class="primary">Сохранить и проверить</button>
    </form>
  </dialog>
  <script src="/assets/app.js" defer></script>
</body></html>
